<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="rootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
    <linearGradient id="nestedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="bds" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">BMessage Settings Schema</text>
  <text x="320" y="46" text-anchor="middle" font-size="11" fill="#94a3b8">~/config/settings/NFSMount</text>

  <!-- Root message -->
  <rect x="30" y="62" width="580" height="38" rx="8" fill="url(#rootGrad)" stroke="#d97706" stroke-width="2" filter="url(#bds)"/>
  <text x="50" y="82" font-size="13" font-weight="700" fill="#92400e" font-family="'Consolas', monospace">BMessage('NFSM')</text>
  <rect x="440" y="70" width="56" height="20" rx="4" fill="#fbbf24"/>
  <text x="468" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#78350f">ROOT</text>

  <!-- window_frame field -->
  <line x1="60" y1="100" x2="60" y2="120" stroke="#d97706" stroke-width="1.5"/>
  <rect x="60" y="120" width="260" height="32" rx="6" fill="url(#fieldGrad)" stroke="#e2e8f0" stroke-width="1.2" filter="url(#bds)"/>
  <text x="76" y="141" font-size="11" font-family="'Consolas', monospace" fill="#7c3aed">"window_frame"</text>
  <rect x="230" y="127" width="76" height="18" rx="4" fill="#f3e8ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="268" y="140" text-anchor="middle" font-size="9.5" font-weight="600" fill="#6d28d9">BRect</text>

  <!-- shares nested message -->
  <line x1="60" y1="100" x2="60" y2="176" stroke="#d97706" stroke-width="1.5"/>
  <line x1="60" y1="176" x2="60" y2="176" stroke="#d97706" stroke-width="1.5"/>
  <rect x="60" y="164" width="540" height="296" rx="8" fill="url(#nestedGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#bds)"/>

  <!-- shares header -->
  <rect x="60" y="164" width="540" height="32" rx="8" fill="#3b82f6"/>
  <rect x="60" y="184" width="540" height="12" fill="#3b82f6"/>
  <text x="80" y="186" font-size="12" font-weight="700" fill="white" font-family="'Consolas', monospace">"shares"</text>
  <text x="190" y="186" font-size="11" fill="#bfdbfe">BMessage (repeated) — one per saved share</text>

  <!-- Share fields - left column -->
  <text x="86" y="218" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"name"</text>
  <text x="195" y="218" font-size="10" fill="#64748b">string</text>

  <text x="86" y="240" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"server"</text>
  <text x="195" y="240" font-size="10" fill="#64748b">string</text>

  <text x="86" y="262" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"export"</text>
  <text x="195" y="262" font-size="10" fill="#64748b">string</text>

  <text x="86" y="284" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"mountPoint"</text>
  <text x="195" y="284" font-size="10" fill="#64748b">string</text>

  <text x="86" y="306" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"readOnly"</text>
  <text x="195" y="306" font-size="10" fill="#64748b">bool</text>

  <text x="86" y="328" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"autoMount"</text>
  <text x="195" y="328" font-size="10" fill="#64748b">bool</text>

  <text x="86" y="350" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"hard"</text>
  <text x="195" y="350" font-size="10" fill="#64748b">bool</text>

  <!-- Right column -->
  <text x="320" y="218" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"timeout"</text>
  <text x="430" y="218" font-size="10" fill="#64748b">int32</text>
  <text x="478" y="218" font-size="9" fill="#94a3b8">default: 60</text>

  <text x="320" y="240" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"retrans"</text>
  <text x="430" y="240" font-size="10" fill="#64748b">int32</text>
  <text x="478" y="240" font-size="9" fill="#94a3b8">default: 5</text>

  <text x="320" y="262" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"port"</text>
  <text x="430" y="262" font-size="10" fill="#64748b">int32</text>
  <text x="478" y="262" font-size="9" fill="#94a3b8">default: 2049</text>

  <text x="320" y="284" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"protocol"</text>
  <text x="430" y="284" font-size="10" fill="#64748b">string</text>
  <text x="478" y="284" font-size="9" fill="#94a3b8">default: "tcp"</text>

  <text x="320" y="306" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"dirtime"</text>
  <text x="430" y="306" font-size="10" fill="#64748b">int32</text>
  <text x="478" y="306" font-size="9" fill="#94a3b8">default: 5</text>

  <text x="320" y="328" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"cacheMetadata"</text>
  <text x="458" y="328" font-size="10" fill="#64748b">bool</text>
  <text x="498" y="328" font-size="9" fill="#94a3b8">default: true</text>

  <text x="320" y="350" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"emulateXattr"</text>
  <text x="458" y="350" font-size="10" fill="#64748b">bool</text>
  <text x="498" y="350" font-size="9" fill="#94a3b8">default: false</text>

  <!-- Divider in nested -->
  <line x1="305" y1="206" x2="305" y2="358" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Separator line -->
  <line x1="80" y1="370" x2="580" y2="370" stroke="#93c5fd" stroke-width="0.8"/>

  <!-- Field count summary -->
  <text x="320" y="392" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">7 identity/config fields + 7 NFS option fields per share</text>

  <!-- Load/Save note -->
  <rect x="80" y="408" width="480" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="320" y="424" text-anchor="middle" font-size="10" fill="#166534" font-weight="600">Persistence: BFile + BMessage::Flatten() / Unflatten()</text>
  <text x="320" y="440" text-anchor="middle" font-size="9.5" fill="#15803d">find_directory(B_USER_SETTINGS_DIRECTORY) + "NFSMount"</text>
</svg>
