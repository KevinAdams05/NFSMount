<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="cAppGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="cWinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="cDataGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="cLogicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="cSettGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cIoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="cAboutGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="cds" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000018"/>
    </filter>
    <marker id="carw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="490" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">NFSMount — Component Diagram</text>
  <text x="490" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">Class relationships and responsibilities (v0.0.5)</text>

  <!-- ====== NFSMountApp ====== -->
  <rect x="360" y="66" width="260" height="60" rx="12" fill="url(#cAppGrad)" stroke="#7c3aed" stroke-width="2" filter="url(#cds)"/>
  <text x="490" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">NFSMountApp</text>
  <text x="490" y="104" text-anchor="middle" font-size="10.5" fill="#6d28d9">BApplication — entry point</text>
  <text x="490" y="118" text-anchor="middle" font-size="9.5" fill="#8b5cf6">Owns Settings · handles --auto · AboutRequested</text>

  <!-- Connection lines from app -->
  <line x1="420" y1="126" x2="160" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#carw)"/>
  <line x1="490" y1="126" x2="490" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#carw)"/>
  <line x1="560" y1="126" x2="820" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#carw)"/>

  <!-- ====== Settings ====== -->
  <rect x="50" y="184" width="220" height="80" rx="10" fill="url(#cSettGrad)" stroke="#d97706" stroke-width="1.5" filter="url(#cds)"/>
  <text x="160" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Settings</text>
  <text x="160" y="222" text-anchor="middle" font-size="10" fill="#b45309">Load/Save BMessage to disk</text>
  <text x="160" y="238" text-anchor="middle" font-size="9.5" fill="#d97706">CountShares(), GetShare(i)</text>
  <text x="160" y="252" text-anchor="middle" font-size="9.5" fill="#d97706">Add/Update/RemoveShare()</text>

  <!-- ====== MainWindow ====== -->
  <rect x="350" y="184" width="280" height="100" rx="10" fill="url(#cWinGrad)" stroke="#0284c7" stroke-width="1.5" filter="url(#cds)"/>
  <text x="490" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">MainWindow</text>
  <text x="490" y="222" text-anchor="middle" font-size="10" fill="#0369a1">BWindow — Titled, resizable</text>
  <text x="490" y="238" text-anchor="middle" font-size="9.5" fill="#0284c7">BMenuBar (File · Edit · Help)</text>
  <text x="490" y="253" text-anchor="middle" font-size="9.5" fill="#0284c7">BColumnListView · button row · status bar</text>
  <text x="490" y="268" text-anchor="middle" font-size="9.5" fill="#0284c7">BMessageRunner for status polling (10s)</text>

  <!-- ====== EditShareWindow ====== -->
  <rect x="700" y="184" width="240" height="100" rx="10" fill="url(#cWinGrad)" stroke="#0284c7" stroke-width="1.5" filter="url(#cds)"/>
  <text x="820" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">EditShareWindow</text>
  <text x="820" y="222" text-anchor="middle" font-size="10" fill="#0369a1">BWindow — Titled (non-modal)</text>
  <text x="820" y="238" text-anchor="middle" font-size="9.5" fill="#0284c7">Version selector + BTabView</text>
  <text x="820" y="253" text-anchor="middle" font-size="9.5" fill="#0284c7">Tabs: Basic · Advanced · NFSv2</text>
  <text x="820" y="268" text-anchor="middle" font-size="9.5" fill="#0284c7">Validation, Cancel/Save</text>

  <!-- Arrow: MainWindow opens EditShareWindow -->
  <line x1="630" y1="234" x2="700" y2="234" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#carw)"/>
  <text x="665" y="226" text-anchor="middle" font-size="8" fill="#0284c7">opens</text>

  <!-- Connection from MainWindow down to children -->
  <line x1="430" y1="284" x2="220" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#carw)"/>
  <line x1="555" y1="284" x2="700" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#carw)"/>
  <line x1="490" y1="284" x2="490" y2="340" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#carw)"/>
  <text x="500" y="320" font-size="8" fill="#0284c7">owns</text>

  <!-- ====== ShareItem ====== -->
  <rect x="80" y="344" width="240" height="80" rx="10" fill="url(#cDataGrad)" stroke="#16a34a" stroke-width="1.5" filter="url(#cds)"/>
  <text x="200" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">ShareItem</text>
  <text x="200" y="382" text-anchor="middle" font-size="10" fill="#15803d">BRow subclass for column list</text>
  <text x="200" y="398" text-anchor="middle" font-size="9.5" fill="#16a34a">Columns: Name, Server, Export, Status</text>
  <text x="200" y="414" text-anchor="middle" font-size="9.5" fill="#16a34a">Caches fIndex, fMounted state</text>

  <!-- ====== ImportExport ====== -->
  <rect x="380" y="344" width="220" height="80" rx="10" fill="url(#cIoGrad)" stroke="#db2777" stroke-width="1.5" filter="url(#cds)"/>
  <text x="490" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#9d174d">ImportExport</text>
  <text x="490" y="382" text-anchor="middle" font-size="10" fill="#be185d">Owns 2× BFilePanel (open + save)</text>
  <text x="490" y="398" text-anchor="middle" font-size="9.5" fill="#db2777">ExportTo() — flatten BMessage</text>
  <text x="490" y="414" text-anchor="middle" font-size="9.5" fill="#db2777">ImportFrom() — validate magic + skip dups</text>

  <!-- ====== ShareManager ====== -->
  <rect x="660" y="344" width="280" height="80" rx="10" fill="url(#cLogicGrad)" stroke="#ea580c" stroke-width="1.5" filter="url(#cds)"/>
  <text x="800" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">ShareManager</text>
  <text x="800" y="382" text-anchor="middle" font-size="10" fill="#c2410c">Static utility — no instances</text>
  <text x="800" y="398" text-anchor="middle" font-size="9.5" fill="#ea580c">Mount(), Unmount(), IsMounted()</text>
  <text x="800" y="414" text-anchor="middle" font-size="9.5" fill="#ea580c">BuildParameterString(), auto-mount scripts</text>

  <!-- ====== AboutBox ====== -->
  <rect x="380" y="450" width="220" height="60" rx="10" fill="url(#cAboutGrad)" stroke="#4f46e5" stroke-width="1.5" filter="url(#cds)"/>
  <text x="490" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">AboutBox</text>
  <text x="490" y="488" text-anchor="middle" font-size="10" fill="#4338ca">show_about_window() — free function</text>
  <text x="490" y="502" text-anchor="middle" font-size="9.5" fill="#4f46e5">BAboutWindow with MIT license + acks</text>

  <!-- AboutBox is called from both App and MainWindow -->
  <line x1="490" y1="284" x2="490" y2="450" stroke="#4f46e5" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="490" y1="126" x2="380" y2="450" stroke="#4f46e5" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Arrow from ShareManager down to kernel API -->
  <line x1="800" y1="424" x2="800" y2="540" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#carw)"/>

  <!-- ====== Kernel API ====== -->
  <rect x="630" y="544" width="320" height="60" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#cds)"/>
  <text x="790" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Haiku Kernel API</text>
  <text x="790" y="584" text-anchor="middle" font-size="10.5" fill="#dc2626" font-family="'Consolas', monospace">fs_mount_volume("nfs"|"nfs4", ...) / fs_unmount_volume()</text>
  <text x="790" y="598" text-anchor="middle" font-size="9" fill="#b91c1c">&lt;fs_volume.h&gt;</text>

  <!-- ====== Message flow legend ====== -->
  <rect x="40" y="540" width="540" height="200" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cds)"/>
  <text x="60" y="564" font-size="12" font-weight="700" fill="#1e293b">Key Message Flow</text>

  <rect x="60" y="578" width="10" height="10" rx="2" fill="#0284c7"/>
  <text x="80" y="588" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgMountShare</text>
  <text x="240" y="588" font-size="10" fill="#64748b">MainWindow -&gt; ShareManager::Mount()</text>

  <rect x="60" y="598" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="80" y="608" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgShareSaved</text>
  <text x="240" y="608" font-size="10" fill="#64748b">EditShareWindow -&gt; MainWindow</text>

  <rect x="60" y="618" width="10" height="10" rx="2" fill="#d97706"/>
  <text x="80" y="628" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgCheckStatus</text>
  <text x="240" y="628" font-size="10" fill="#64748b">BMessageRunner fires every 10s</text>

  <rect x="60" y="638" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="80" y="648" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgAutoMount</text>
  <text x="240" y="648" font-size="10" fill="#64748b">App startup with --auto flag</text>

  <rect x="60" y="658" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="80" y="668" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgShareSelected</text>
  <text x="240" y="668" font-size="10" fill="#64748b">List selection -&gt; enable/disable buttons + menus</text>

  <rect x="60" y="678" width="10" height="10" rx="2" fill="#db2777"/>
  <text x="80" y="688" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgImport/ExportPanelDone</text>
  <text x="270" y="688" font-size="10" fill="#64748b">BFilePanel -&gt; MainWindow -&gt; ImportExport</text>

  <rect x="60" y="698" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="80" y="708" font-size="10" fill="#334155" font-family="'Consolas', monospace">kMsgShowAbout</text>
  <text x="240" y="708" font-size="10" fill="#64748b">Help menu -&gt; show_about_window()</text>

  <rect x="60" y="718" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="80" y="728" font-size="10" fill="#334155" font-family="'Consolas', monospace">B_ABOUT_REQUESTED</text>
  <text x="240" y="728" font-size="10" fill="#64748b">Deskbar "About this app" -&gt; AboutRequested()</text>
</svg>
