<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="dsRootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="dsNestedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="dsV2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#f5d0fe"/>
    </linearGradient>
    <filter id="dsSh" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Settings File Format — Detailed Schema</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">Flattened BMessage (binary) at ~/config/settings/NFSMount</text>

  <!-- Root message -->
  <rect x="30" y="64" width="700" height="38" rx="8" fill="url(#dsRootGrad)" stroke="#d97706" stroke-width="2" filter="url(#dsSh)"/>
  <text x="50" y="85" font-size="13" font-weight="700" fill="#92400e" font-family="'Consolas', monospace">BMessage('NFSM')</text>

  <!-- window_frame -->
  <line x1="60" y1="102" x2="60" y2="120" stroke="#d97706" stroke-width="1.5"/>
  <rect x="60" y="120" width="310" height="30" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.2" filter="url(#dsSh)"/>
  <text x="76" y="140" font-size="11" font-family="'Consolas', monospace" fill="#7c3aed">"window_frame"</text>
  <text x="210" y="140" font-size="10" fill="#64748b">: BRect</text>
  <text x="280" y="140" font-size="9" fill="#94a3b8" font-style="italic">position &amp; size</text>

  <!-- shares nested -->
  <line x1="60" y1="102" x2="60" y2="168" stroke="#d97706" stroke-width="1.5"/>
  <rect x="60" y="164" width="660" height="338" rx="8" fill="url(#dsNestedGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#dsSh)"/>
  <rect x="60" y="164" width="660" height="30" rx="8" fill="#3b82f6"/>
  <rect x="60" y="182" width="660" height="12" fill="#3b82f6"/>
  <text x="80" y="185" font-size="12" font-weight="700" fill="white" font-family="'Consolas', monospace">"shares"</text>
  <text x="170" y="185" font-size="11" fill="#bfdbfe">: BMessage (repeated, one per share)</text>

  <!-- Left column: identity fields -->
  <text x="82" y="216" font-size="10" font-weight="700" fill="#1e40af">Identity</text>
  <line x1="82" y1="222" x2="180" y2="222" stroke="#93c5fd" stroke-width="0.8"/>

  <text x="90" y="240" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"nfsVersion"</text>
  <text x="200" y="240" font-size="10" fill="#64748b">: int32</text>
  <text x="260" y="240" font-size="9" fill="#94a3b8">2 or 4</text>

  <text x="90" y="260" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"name"</text>
  <text x="180" y="260" font-size="10" fill="#64748b">: string</text>

  <text x="90" y="280" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"server"</text>
  <text x="180" y="280" font-size="10" fill="#64748b">: string</text>

  <text x="90" y="300" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"export"</text>
  <text x="180" y="300" font-size="10" fill="#64748b">: string</text>

  <text x="90" y="320" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"mountPoint"</text>
  <text x="200" y="320" font-size="10" fill="#64748b">: string</text>

  <!-- Left column: flags -->
  <text x="82" y="352" font-size="10" font-weight="700" fill="#1e40af">Flags</text>
  <line x1="82" y1="358" x2="180" y2="358" stroke="#93c5fd" stroke-width="0.8"/>

  <text x="90" y="376" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"readOnly"</text>
  <text x="190" y="376" font-size="10" fill="#64748b">: bool</text>
  <text x="240" y="376" font-size="9" fill="#94a3b8">false</text>

  <text x="90" y="396" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"autoMount"</text>
  <text x="200" y="396" font-size="10" fill="#64748b">: bool</text>
  <text x="250" y="396" font-size="9" fill="#94a3b8">false</text>

  <text x="90" y="416" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"hard"</text>
  <text x="150" y="416" font-size="10" fill="#64748b">: bool</text>
  <text x="200" y="416" font-size="9" fill="#94a3b8">false (soft mode, v4 only)</text>

  <!-- NFSv2 fields callout (bottom-left) -->
  <rect x="76" y="436" width="290" height="56" rx="6" fill="url(#dsV2Grad)" stroke="#a855f7" stroke-width="1"/>
  <text x="86" y="452" font-size="10" font-weight="700" fill="#7e22ce">NFSv2 only — present when nfsVersion = 2</text>
  <text x="90" y="470" font-size="10.5" font-family="'Consolas', monospace" fill="#7e22ce">"hostname" : string</text>
  <text x="220" y="470" font-size="10.5" font-family="'Consolas', monospace" fill="#7e22ce">"uid" : int32</text>
  <text x="90" y="486" font-size="10.5" font-family="'Consolas', monospace" fill="#7e22ce">"gid" : int32</text>
  <text x="220" y="486" font-size="9" fill="#a855f7" font-style="italic">defaults: 0 / 0</text>

  <!-- Divider -->
  <line x1="380" y1="210" x2="380" y2="494" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Right column: NFS4 options -->
  <text x="400" y="216" font-size="10" font-weight="700" fill="#1e40af">NFSv4 Options — present when nfsVersion = 4</text>
  <line x1="400" y1="222" x2="700" y2="222" stroke="#93c5fd" stroke-width="0.8"/>

  <text x="410" y="240" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"timeout"</text>
  <text x="500" y="240" font-size="10" fill="#64748b">: int32</text>
  <text x="560" y="240" font-size="9" fill="#94a3b8">60 seconds</text>

  <text x="410" y="260" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"retrans"</text>
  <text x="500" y="260" font-size="10" fill="#64748b">: int32</text>
  <text x="560" y="260" font-size="9" fill="#94a3b8">5 retries</text>

  <text x="410" y="280" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"port"</text>
  <text x="470" y="280" font-size="10" fill="#64748b">: int32</text>
  <text x="530" y="280" font-size="9" fill="#94a3b8">2049</text>

  <text x="410" y="300" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"protocol"</text>
  <text x="510" y="300" font-size="10" fill="#64748b">: string</text>
  <text x="570" y="300" font-size="9" fill="#94a3b8">"tcp"</text>

  <text x="410" y="320" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"dirtime"</text>
  <text x="500" y="320" font-size="10" fill="#64748b">: int32</text>
  <text x="560" y="320" font-size="9" fill="#94a3b8">5 seconds</text>

  <text x="410" y="340" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"cacheMetadata"</text>
  <text x="540" y="340" font-size="10" fill="#64748b">: bool</text>
  <text x="590" y="340" font-size="9" fill="#94a3b8">true</text>

  <text x="410" y="360" font-size="10.5" font-family="'Consolas', monospace" fill="#1e40af">"emulateXattr"</text>
  <text x="540" y="360" font-size="10" fill="#64748b">: bool</text>
  <text x="590" y="360" font-size="9" fill="#94a3b8">false</text>

  <!-- Note about field presence -->
  <rect x="400" y="408" width="300" height="76" rx="6" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="412" y="426" font-size="10" font-weight="700" fill="#92400e">Field-presence rules</text>
  <text x="412" y="442" font-size="9.5" fill="#78350f">v4 fields are written only when nfsVersion = 4.</text>
  <text x="412" y="456" font-size="9.5" fill="#78350f">v2 fields are written only when nfsVersion = 2.</text>
  <text x="412" y="470" font-size="9.5" fill="#78350f">Reading code uses FindXxx with default-value</text>
  <text x="412" y="479" font-size="9.5" fill="#78350f">fallbacks, so older settings stay loadable.</text>

  <!-- Persistence note -->
  <rect x="80" y="514" width="640" height="80" rx="6" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="536" font-size="10.5" font-weight="600" fill="#1e293b">Persistence API:</text>
  <text x="100" y="556" font-size="10" fill="#64748b" font-family="'Consolas', monospace">Save: BFile file(path, B_WRITE_ONLY | B_CREATE_FILE | B_ERASE_FILE);</text>
  <text x="100" y="572" font-size="10" fill="#64748b" font-family="'Consolas', monospace">      fSettings.Flatten(&amp;file);</text>
  <text x="100" y="588" font-size="10" fill="#64748b" font-family="'Consolas', monospace">Load: BFile file(path, B_READ_ONLY); fSettings.Unflatten(&amp;file);</text>
</svg>
